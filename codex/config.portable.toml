# Portable Codex config fragment (SSOT).
# install merges ONLY these keys into ~/.codex/config.toml.
# NOT synced (machine-specific, regenerated locally):
#   node_repl, marketplaces, plugins enable, hooks.state, projects, [windows], notify.

model = "gpt-5.5"
model_reasoning_effort = "low"
personality = "pragmatic"

[features]
multi_agent = true
js_repl = false
goals = true
memories = false
chronicle = false

[desktop]
sansFontSize = 16
codeFontSize = 13
localeOverride = "ko-KR"
git-pull-request-merge-method = "squash"
git-show-sidebar-pr-icons = true
conversationDetailMode = "STEPS_COMMANDS"

[memories]
generate_memories = false
use_memories = false

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.anthropicDocs]
url = "https://platform.claude.com/docs/mcp"

[mcp_servers.microsoftLearn]
url = "https://learn.microsoft.com/api/mcp"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PERSONAL_ACCESS_TOKEN"

[mcp_servers.github.http_headers]
X-MCP-Readonly = "true"
X-MCP-Toolsets = "repos,issues,pull_requests"
